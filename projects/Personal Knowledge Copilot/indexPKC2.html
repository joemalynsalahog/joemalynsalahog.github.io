<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylePKC.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Personal Knowledge Copilot</title>
</head>
<body>
    <section class="h-screen flex bg-gray-400">

        <!-- Sidebar -->
        <aside class="w-64 bg-gray-100 border-r border-gray-300 flex flex-col items-center p-4">
            
            <!-- Logo -->
            <img src="../../images/PERSONAL KNOWLEDGE COPILOT LOGO.png" alt="Bot Logo" class="w-20 h-20 mb-2 rounded-full">
            
            <!-- Label -->
            <div class="text-center font-bold mb-4">PERSONAL KNOWLEDGE<br/>COPILOT</div>
            
            <!-- Buttons -->
            <nav class="flex flex-col w-full space-y-2">
            <button class="flex items-center w-full p-2 bg-white rounded shadow hover:bg-gray-200">
                <span class="mr-2">📄</span> Documents
            </button>
            <button class="flex items-center w-full p-2 bg-white rounded shadow hover:bg-gray-200">
                <span class="mr-2">💬</span> Chats
            </button>
            <button class="flex items-center w-full p-2 bg-white rounded shadow hover:bg-gray-200">
                <span class="mr-2">❓</span> Ask AI
            </button>
            <button class="flex items-center w-full p-2 bg-white rounded shadow hover:bg-gray-200">
                <span class="mr-2">✨</span> Summary
            </button>
            <button class="flex items-center w-full p-2 bg-white rounded shadow hover:bg-gray-200">
                <span class="mr-2">📝</span> Notes
            </button>
            <button class="flex items-center w-full p-2 bg-white rounded shadow hover:bg-gray-200">
                <span class="mr-2">⬇️</span> Export
            </button>
            <button class="flex items-center w-full p-2 mt-auto bg-white rounded shadow hover:bg-gray-200">
                <span class="mr-2">⚙️</span> Settings
            </button>
            </nav>
        </aside>

    <!-- Main Content -->


        <!-- Main Content / Chat + PDF -->

        <main class="flex-1 p-6 flex flex-col">

            <!-- Chat Box
            <div class="flex-1 border border-gray-300 rounded p-4 bg-white overflow-y-auto flex items-center justify-center" id="chatBox">
                <p id="placeholderText" class="text-gray-700 text-center text-2xl">
                    AI chat will appear here after uploading a file
                </p>
            </div> -->


            <!-- Chat Box -->
            <div class="flex-1 border border-gray-300 rounded p-4 bg-white overflow-y-auto" id="chatBox">
                <p class="text-gray-500 text-center mt-10">AI chat will appear here after uploading a file</p>
            </div>

            <!-- Input / Prompt -->
            <div class="mt-4 flex">
                <label for="fileUpload" class="cursor-pointer px-2 bg-white flex items-center">
                    <img src="../../images/paperclip-solid-full.svg" alt="Attach file" class="w-5 h-5">
                </label>

                <input id="fileUpload" type="file" accept="application/pdf" class="hidden">
                <input type="text" placeholder="Ask a question..." class="flex-1 border border-gray-300 rounded-l px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                <button class="bg-blue-500 text-white px-4 rounded-r hover:bg-blue-600">Send</button>
            </div>

        </main>


































    </section>




    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <script src="scriptPKC.js"></script>
</body>
</html>
